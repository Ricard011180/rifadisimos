<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botones Neón</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff2d78;
            --neon-green: #00ff99;
            --neon-yellow: #ffe600;
            --neon-purple: #bf00ff;
            --neon-orange: #ff6a00;
            --bg: #080c14;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            padding: 20px;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            /* apilados por defecto */
            gap: 14px;
            padding: 32px 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            backdrop-filter: blur(8px);
            width: 100%;
            max-width: 340px;
        }

        /* En pantallas grandes: fila */
        @media (min-width: 640px) {
            .nav-buttons {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                max-width: 820px;
            }
        }

        /* ── Botón base ── */
        .btn-nav {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 26px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 6px;
            border: 1px solid currentColor;
            overflow: hidden;
            cursor: pointer;
            width: 100%;
            /* ancho completo en móvil */
            transition: color 0.4s ease, box-shadow 0.4s ease, transform 0.2s ease;

            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.5s ease forwards;
        }

        /* En pantallas grandes: tamaño automático */
        @media (min-width: 640px) {
            .btn-nav {
                width: auto;
            }
        }

        /* Relleno que sube desde abajo */
        .btn-nav::before {
            content: '';
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: currentColor;
            transition: bottom 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 0;
        }

        .btn-nav:hover::before {
            bottom: 0;
        }

        .btn-nav svg,
        .btn-nav span {
            position: relative;
            z-index: 1;
            transition: color 0.3s ease;
        }

        .btn-nav:hover {
            color: #080c14 !important;
            transform: translateY(-3px);
        }

        .btn-nav:hover svg {
            stroke: #080c14;
        }

        .btn-nav:active {
            transform: translateY(0) scale(0.97);
        }

        /* ── Colores individuales ── */
        .btn-1 {
            color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .btn-2 {
            color: var(--neon-pink);
            box-shadow: 0 0 10px rgba(255, 45, 120, 0.3);
        }

        .btn-3 {
            color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 153, 0.3);
        }

        .btn-4 {
            color: var(--neon-yellow);
            box-shadow: 0 0 10px rgba(255, 230, 0, 0.3);
        }

        .btn-5 {
            color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(191, 0, 255, 0.3);
        }

        .btn-6 {
            color: var(--neon-orange);
            box-shadow: 0 0 10px rgba(255, 106, 0, 0.3);
        }

        .btn-1:hover {
            box-shadow: 0 0 22px rgba(0, 240, 255, 0.7), 0 0 50px rgba(0, 240, 255, 0.3);
        }

        .btn-2:hover {
            box-shadow: 0 0 22px rgba(255, 45, 120, 0.7), 0 0 50px rgba(255, 45, 120, 0.3);
        }

        .btn-3:hover {
            box-shadow: 0 0 22px rgba(0, 255, 153, 0.7), 0 0 50px rgba(0, 255, 153, 0.3);
        }

        .btn-4:hover {
            box-shadow: 0 0 22px rgba(255, 230, 0, 0.7), 0 0 50px rgba(255, 230, 0, 0.3);
        }

        .btn-5:hover {
            box-shadow: 0 0 22px rgba(191, 0, 255, 0.7), 0 0 50px rgba(191, 0, 255, 0.3);
        }

        .btn-6:hover {
            box-shadow: 0 0 22px rgba(255, 106, 0, 0.7), 0 0 50px rgba(255, 106, 0, 0.3);
        }

        /* ── Entrada escalonada ── */
        .btn-nav:nth-child(1) {
            animation-delay: 0.05s;
        }

        .btn-nav:nth-child(2) {
            animation-delay: 0.12s;
        }

        .btn-nav:nth-child(3) {
            animation-delay: 0.19s;
        }

        .btn-nav:nth-child(4) {
            animation-delay: 0.26s;
        }

        .btn-nav:nth-child(5) {
            animation-delay: 0.33s;
        }

        .btn-nav:nth-child(6) {
            animation-delay: 0.40s;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── SVG íconos ── */
        .btn-nav svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }
    </style>
</head>

<body>

    <nav class="nav-buttons">

        <a href="#inicio" class="btn-nav btn-1">
            <svg viewBox="0 0 24 24">
                <path d="M3 12L12 3l9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" />
            </svg>
            <span>Inicio</span>
        </a>

        <a href="#conocemos" class="btn-nav btn-2">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
            <span>Conocemos</span>
        </a>

        <a href="#rifas" class="btn-nav btn-3">
            <svg viewBox="0 0 24 24">
                <rect x="2" y="7" width="20" height="14" rx="2" />
                <path d="M16 3l-4 4-4-4M12 7v6M9 13h6" />
            </svg>
            <span>Rifas</span>
        </a>

        <a href="#testimonios" class="btn-nav btn-4">
            <svg viewBox="0 0 24 24">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
            </svg>
            <span>Testimonios</span>
        </a>

        <a href="#ayudanos" class="btn-nav btn-5">
            <svg viewBox="0 0 24 24">
                <path
                    d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z" />
            </svg>
            <span>Ayúdanos</span>
        </a>

        <a href="#contacto" class="btn-nav btn-6">
            <svg viewBox="0 0 24 24">
                <path d="M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z" />
                <polyline points="22,6 12,13 2,6" />
            </svg>
            <span>Contacto</span>
        </a>

    </nav>

</body>

</html>
